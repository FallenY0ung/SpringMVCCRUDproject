<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Все люди</title>
</head>
<body>

<div th:each="person : ${people}">

    <a th:href="@{/people/{id}(id=${person.getId()})}" th:text="${person.getName()+ ', ' + person.getAge()}">user</a>
</div>
<br/>
<hr/>
<a href="/people/new">Create new Person</a>

<form th:action="@{/logout}" method="post">
    <button type="submit">Exit</button>
</form>

<form th:action="@{/admin/replication/run}" method="post" style="margin-top: 20px;">
    <button type="submit">Replication DB run</button>
</form>
</body>
</html>
