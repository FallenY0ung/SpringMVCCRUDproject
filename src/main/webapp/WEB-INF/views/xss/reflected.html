<body>
<h2>Reflected XSS (protected)</h2>

<form th:action="@{/xss/reflected}" method="get">

<p>You entered (reflected):

</p>

<p>Try payload:
  <code>&lt;script&gt;alert('XSS')&lt;/script&gt;</code>
</p>

</body>
</html>
